    <script>
    (function() {
      const guidesData = {"dongling-shan":{"drive":"双井→东三环→北三环→京藏高速→京蔚高速→斋堂出口→G109→江水河村，全程约2h（京蔚高速开通后大幅缩短）","transit":"地铁10号线→苹果园站→M11路/M23路→洪水口站→江水河村，全程约3.5h","time":"1-2天。单日可往返走江水河村懒人线（4-5h往返）；想登顶看日出星空建议过夜","overnight":"建议过夜。江水河村有农家院，可露营观星。次日清晨登顶看云海日出","tips":"导航到江水河村而非「东灵山」（会绕远）。带足水和防晒，山顶风大需冲锋衣。可骑马上山100-200元。7-9月高山草甸最美，可观云海"},"guanting-reservoir":{"drive":"双井→东三环→北三环→京藏高速→康庄出口→官厅水库，全程约1.5h","transit":"地铁10号线→西直门→市郊铁路S2线→延庆站→打车/公交至水库，全程约2.5h","time":"半天到1天。环湖自驾拍照2-3h，露营可住一晚","overnight":"可不过夜。如露营可选湖畔营地，看风车日落和星空","tips":"环湖公路自驾体验极佳，夕阳时分风车与落日绝美。夏季可桨板、皮划艇。周边康西草原可骑马"},"jiankou-greatwall":{"drive":"双井→东三环→北三环→京承高速→怀柔出口→怀黄路→箭扣，全程约2h","transit":"地铁10号线→东直门→916快→怀柔→H23/H24路→西栅子村，全程约3h","time":"1天。全程徒步约6-8h，建议早6点出发","overnight":"可不过夜。如体力一般可在西栅子村民宿住一晚，次日返程","tips":"野长城无门票，但有一定危险，建议穿防滑鞋、带登山杖。箭扣段最险峻，正北楼、天梯、鹰飞倒仰是经典机位。不要雨天前往"},"yudu-shan":{"drive":"双井→东三环→北三环→京藏高速→延庆→G110→玉皇庙村，全程约2h","transit":"地铁10号线→西直门→市郊铁路S2线→延庆站→打车至玉皇庙，全程约2.5h","time":"1天。徒步往返约5-6h，高海拔注意防晒","overnight":"可不过夜。周边农家院可住","tips":"北京第二高峰，山顶有高山草甸。建议走玉皇庙路线，路况较好。带足水和防风衣物，山顶温差大"},"cuandixia":{"drive":"双井→东三环→西三环→阜石路→G109→斋堂→爨底下，全程约2h","transit":"地铁10号线→苹果园→M11路→斋堂→换乘M12路→爨底下，全程约3h","time":"半天到1天。古村漫步2-3h，可搭配一线天、柏峪","overnight":"建议过夜。古村有民宿，可住一晚体验清晨的宁静，晚上看星空","tips":"门票35元含一线天、柏峪。明清古民居保存完好，「爨」字造型村落。适合拍照，建议穿民国风/复古服装。一线天道路狭窄，注意会车"},"shidu":{"drive":"双井→东三环→西三环→京昆高速→张坊出口→十渡，全程约1.5h","transit":"地铁10号线→六里桥→836路→十渡，全程约2.5h","time":"1-2天。漂流2-3h，孤山寨1-2h，蹦极体验半天","overnight":"建议过夜。十渡有农家院和民宿，可漂流后住一晚，次日去孤山寨或蹦极","tips":"夏季漂流热门，周末人多建议早到。蹦极是网红项目。拒马乐园、孤山寨、东湖港各有特色。夏天可玩水、竹筏"},"jinhai-lake":{"drive":"双井→东三环→机场高速→京平高速→平谷出口→金海湖，全程约1h","transit":"地铁10号线→三元桥→852路→平谷→平28路→金海湖，全程约2h","time":"1天。游船2h，大坝1h，周边采摘半天","overnight":"可不过夜。如想深度休闲可在碧波岛露营或住民宿","tips":"被誉为「京郊小瑞士」，碧波岛欧式草坪出片。可乘游船、快艇、皮划艇。秋季采摘平谷大桃。周末人多建议早出发"},"xiangshan":{"drive":"双井→东三环→北三环→香山路→香山，全程约40min","transit":"地铁10号线→巴沟→西郊线→香山站，全程约1h","time":"半天。登山2-3h，山顶+缆车下山约4h","overnight":"不需要。市内景点，当日往返","tips":"秋季红叶最出名（10月中下旬），但人也最多。建议工作日或早7点前到达。缆车可节省体力。碧云寺、卧佛寺可联游"},"fenghuangling":{"drive":"双井→         html += '<h4>' + name + '</h4>';
        if (guide) {
          if (guide.drive) html += '<div class="bo-guide-section"><div class="bo-guide-section-title">自驾路线</div><div class="bo-guide-section-content">' + guide.drive + '</div></div>';
          if (guide.transit) html += '<div class="bo-guide-section"><div class="bo-guide-section-title">公共交通</div><div class="bo-guide-section-content">' + guide.transit + '</div></div>';
          if (guide.time) html += '<div class="bo-guide-section"><div class="bo-guide-section-title">建议时间</div><div class="bo-guide-section-content">' + guide.time + '</div></div>';
          if (guide.overnight) html += '<div class="bo-guide-section"><div class="bo-guide-section-title">过夜建议</div><div class="bo-guide-section-content">' + guide.overnight + '</div></div>';
          if (guide.tips) html += '<div class="bo-guide-section"><div class="bo-guide-section-title">实用贴士</div><div class="bo-guide-section-content">' + guide.tips + '</div></div>';
        }
        if (reviews.length > 0) {
          html += '<div class="bo-guide-section"><div class="bo-guide-section-title">用户评价</div>';
          for (var ri = 0; ri < reviews.length; ri++) {
            var r = reviews[ri];
            html += '<div class="bo-review-item"><div class="bo-review-text">' + r.content + '</div><div class="bo-review-source">' + r.source + (r.url ? ' · <a href="' + r.url + '" target="_blank">查看原文</a>' : '') + '</div></div>';
          }
          html += '</div>';
        }
        detailEl.innerHTML = html;
      }
      function boBackToList() {
        document.getElementById('bo-guide-list').style.display = 'block';
        document.getElementById('bo-guide-detail').classList.remove('active');
      }
      window.boOpenGuide = boOpenGuide;
      window.boCloseGuide = boCloseGuide;
      window.boRenderList = boRenderList;
      window.boSearchGuide = boSearchGuide;
      window.boShowDetail = boShowDetail;
      window.boBackToList = boBackToList;
    })();
    </script>
  </body>
</html>
